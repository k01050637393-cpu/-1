name: Daily YouTube Bot (Luna)
on:
  schedule:
    # 매일 UTC 기준 18:00 (한국 시간 새벽 3시)
    - cron: '0 18 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        sudo apt-get install -y ffmpeg
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Unlock Secrets
      env:
        SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS }}
        TOKEN_PICKLE: ${{ secrets.GOOGLE_TOKEN_PICKLE }}
      run: |
        echo "$SECRET_JSON" > client_secrets.json
        echo "$TOKEN_PICKLE" | base64 --decode > token.pickle
    - name: Run Auto Bot
      run: python daily_youtube_bot.py
